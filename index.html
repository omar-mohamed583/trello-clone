<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Trello Clone</title>
    <link
      rel="stylesheet"
      href="css/style.css"
    />
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      rel="icon"
      href="images/logo.svg"
    />
  </head>
  <body class="bg-[#091413] text-white overflow-x-hidden min-h-dvh">
    <header class="fixed inset-[0_0_auto_0] bg-(--clr-accent-200) z-100000">
      <div
        class="container flex px-2 lg:px-6 py-6 justify-center max-w-[1900px] mx-auto gap-6 items-center"
      >
        <h1
          class="text-lg md:text-2xl  flex gap-2 font-bold text-(--clr-accent-400) cursor-pointer items-center me-auto animate-[bright_6s_infinite_alternate] max-w-fit"
        >
          <img
            src="images/logo.svg"
            alt="logo"
            width="32"
            height="32"
            class="scale-[70%] md:scale-[100%]"
          />
          Trello Clone
        </h1>

        <div class="boards grid relative max-w-fit -left-2.5 sm:-left-15">
          <button
            onclick="this.nextElementSibling.classList.toggle('active');this.nextElementSibling.classList.toggle('hidden'); this.classList.toggle('active')"
            class="menu-toggler cursor-pointer sm:hidden flex items-center gap-1 [&.active_svg]:rotate-180 rounded-md transition-colors hover:bg-zinc-300/20 p-2 [div:has(+_.active)_>_&]:outline-4 outline-gray-500 [div:has(+_.active)_>_&]:bg-zinc-300/20"
          >
            Boards
            <svg
              xmlns="http://www.w3.org/2000/svg"
              height="24px"
              viewBox="0 -960 960 960"
              width="24px"
              fill="#FFFFFF"
            >
              <path d="M480-344 240-584l56-56 184 184 184-184 56 56-240 240Z" />
            </svg>
          </button>
          <div class="hidden gap-4 *:cursor-pointer sm:flex sm:static absolute top-[108%] right-0 bg-zinc-500/50 border border-zinc-500/70 sm:border-0 sm:bg-transparent backdrop-blur-lg rounded-md p-2 z-50">
            <button
              class="toggle-boards tracking-wide flex items-center p-2 rounded-md transition-colors hover:bg-zinc-300/20 gap-1 [div:has(~_.active)_>_&]:outline-4 outline-gray-500 [div:has(~_.active)_>_&]:bg-zinc-300/20 [div:has(~_.active)_>_&_svg]:rotate-180 justify-between"
            >
              Boards
              <svg
                xmlns="http://www.w3.org/2000/svg"
                height="24px"
                viewBox="0 -960 960 960"
                width="24px"
                fill="#FFFFFF"
                class="transition-transform"
              >
                <path
                  d="M480-344 240-584l56-56 184 184 184-184 56 56-240 240Z"
                />
              </svg>
            </button>
            <button
              class="add-board flex items-center p-2 rounded-md transition-colors hover:bg-zinc-300/20 gap-1 min-w-max"
            >
              Add New Board
              <svg
                xmlns="http://www.w3.org/2000/svg"
                height="24px"
                viewBox="0 -960 960 960"
                width="24px"
                fill="#FFFFFF"
              >
                <path
                  d="M440-440H200v-80h240v-240h80v240h240v80H520v240h-80v-240Z"
                />
              </svg>
            </button>
            <ul
              class="board-list absolute scale-y-70 pointer-events-none opacity-0 transition-
            [transform,opacity] origin-top-right [&.active]:pointer-events-auto [&.active]:scale-y-100 [&.active]:opacity-100 duration-100 left-0 top-[105%] rounded-md bg-zinc-500/60 border border-zinc-500/70 min-h-12 grid *:p-3 *:cursor-pointer *:w-56 *:transition-colors [&_>_*:not(.no-boards):hover]:hover:bg-zinc-300/20 *:flex *:justify-between z-50 *:rounded-md backdrop-blur-lg"
            >
              <li class="no-boards">No boards to show.</li>
            </ul>
          </div>
        </div>

        <div class="account relative ms-auto">
          <div
            class="profile-icon aspect-square w-12 rounded-[50%] bg-purple-600 flex place-items-center justify-center cursor-pointer [&:has(+_.active)]:outline-4 [&:has(+_.active)]:outline-gray-500/60 [&:has(+_.active)]:outline-offset-1 uppercase"
          >
            J
          </div>
          <ul
            class="profile absolute top-[113%] right-0 rounded-md bg-zinc-500/30 border border-zinc-500/70 backdrop-blur-lg grid *:py-4 *:px-3 *:font-medium transition-[transform,opacity] scale-y-100 pointer-events-none opacity-0 [&.active]:pointer-events-auto [&.active]:opacity-100 [&.active]:scale-y-100 origin-top-right [&.active]:z-50 *:transition-colors *:rounded-md [&_>_*:hover]:bg-zinc-300/20 *:cursor-pointer *:text-sm min-w-40"
          >
            <li class="dashboard flex items-center justify-between" onclick="window.location.href = './dashboard.html'">
              Dashboard
              <img src="images/icons8-analytics-35.png" width="27" height="27" alt="Logo">
            </li>
            <li class="logout flex items-center justify-between text-rose-300">
              Logout
              <svg
                xmlns="http://www.w3.org/2000/svg"
                height="24px"
                viewBox="0 -960 960 960"
                class="fill-rose-300"
                width="24px"
              >
                <path
                  d="M200-120q-33 0-56.5-23.5T120-200v-560q0-33 23.5-56.5T200-840h280v80H200v560h280v80H200Zm440-160-55-58 102-102H360v-80h327L585-622l55-58 200 200-200 200Z"
                />
              </svg>
            </li>
          </ul>
        </div>
      </div>
    </header>

    <main class="grid gap-6 px-2 lg:px-4 pb-6 pt-36 overflow-x-clip [content-visibility:auto]">
      <h2 class="text-lg ms-3 -z-10 relative">
        Board:
        <span class="ml-2 font-bold text-purple-400 current-board-name"></span>
      </h2>
      <div class="main-content grid gap-6 justify-center"></div>

      <button
        class="no-acc p-3 bg-(--clr-accent-300) max-w-fit justify-self-center rounded-md cursor-pointer"
        style="display: none"
        onclick="window.location.href = './sign-in.html?act=cr'"
      >
        Please sign up to save your trello
      </button>
    </main>

    <dialog
      id="addingBoard"
      class="fixed top-[50%] left-[50%] translate-x-[-50%] translate-y-[-50%] bg-(--clr-accent-100) transition-transform scale-50 [[open]]:scale-100 duration-300 p-6 [[open]]:grid border border-zinc-400/20 rounded-2xl shadow-2xl w-[min(90vw,420px)] backdrop:backdrop-blur-xl animate-[appear_.3s]"
    >
      <form
        class="grid gap-5"
        action=""
        method="dialog"
      >
        <div class="grid gap-1 [*]:items-center">
          <div
            class="text-sm font-semibold uppercase tracking-[0.2em] text-purple-200"
          >
            New board
          </div>
          <h2
            class="text-2xl leading-[normal] font-bold text-white text-center"
          >
            Add board
          </h2>
          <p class="text-sm leading-6 text-zinc-300">
            Enter the board name and optional sections. If you add any section
            names, default sections will be disabled.
          </p>
        </div>

        <label class="grid gap-2 text-sm leading-[normal] text-zinc-200">
          <span class="font-medium">Board Name</span>
          <input
            id="board-name"
            name="boardName"
            type="text"
            required
            class="w-full rounded-2xl border border-zinc-700 bg-zinc-950/80 px-4 py-3 text-white outline-none transition focus:border-purple-400 focus:ring-2 focus:ring-purple-500/20"
            placeholder="Example: Project roadmap"
          />
        </label>

        <div class="grid gap-3">
          <div class="flex items-center justify-between gap-3">
            <div class="text-sm font-medium text-zinc-200 leading-[normal]">
              Section names
            </div>
            <button
              id="add-section-field"
              type="button"
              class="add-field inline-flex items-center gap-2 rounded-full bg-purple-600 px-3 py-2 text-sm font-semibold text-white transition leading-[normal] hover:bg-purple-500"
            >
              <span class="text-xl">+</span>
              Add field
            </button>
          </div>

          <div
            id="section-fields"
            class="grid gap-2 max-h-[10ch] overflow-auto"
          >
            <div class="flex items-center gap-2">
              <input
                name="section"
                type="text"
                class="flex-1 rounded-2xl border border-zinc-700 bg-zinc-950/80 px-4 py-3 text-white outline-none"
                placeholder="Section name (optional)"
              />
              <button
                onclick="this.parentElement.remove()"
                type="button"
                class="remove-section h-8 flex items-center justify-center w-8 rounded-full bg-red-600 text-white transition hover:bg-red-500"
                aria-label="Remove section"
              >
                ×
              </button>
            </div>
          </div>
        </div>

        <div class="flex flex-col gap-3 sm:flex-row sm:justify-end">
          <button
            type="button"
            class="rounded-2xl border border-zinc-700 bg-transparent px-4 leading-[normal] py-3 text-sm font-medium text-zinc-200 transition hover:bg-white/5"
            onclick="document.getElementById('addingBoard').close()"
          >
            Cancel
          </button>
          <button
            type="submit"
            class="submit-board rounded-2xl bg-purple-600 px-4 py-3 text-sm font-semibold text-white transition hover:bg-purple-500 leading-[normal]"
          >
            Create board
          </button>
        </div>
      </form>
    </dialog>

    <dialog
      class="node-details rounded-2xl border border-white/10 bg-[linear-gradient(135deg,rgba(9,20,19,0.98),rgba(30,41,59,0.98))] p-0 shadow-2xl shadow-black/40 backdrop:backdrop-blur-2xl fixed top-[50%] left-[50%] translate-[-50%] z-100000000000000 w-[min(92vw,720px)] max-w-180"
    >
      <form
        id="node-details-form"
        class="grid gap-4 p-5 sm:p-6"
      >
        <div class="flex items-start justify-between gap-3">
          <div class="grid gap-1">
            <p
              class="text-[0.65rem] font-semibold uppercase tracking-[0.25em] text-purple-200/90"
            >
              Update task
            </p>
            <h3 class="text-xl font-semibold text-white">Task details</h3>
          </div>
          <div class="flex items-center gap-2">
            <button
              type="button"
              class="back inline-flex h-11 w-11 items-center justify-center rounded-2xl border border-white/10 bg-white/10 text-white transition hover:bg-white/20"
              aria-label="Close editor"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                height="22px"
                viewBox="0 -960 960 960"
                width="22px"
                fill="#FFFFFF"
              >
                <path
                  d="M360-240 120-480l240-240 56 56-144 144h568v80H272l144 144-56 56Z"
                />
              </svg>
            </button>
            <button
              type="submit"
              class="save inline-flex items-center justify-center rounded-2xl bg-[#68F378] px-4 py-2.5 text-md leading-[normal] font-semibold text-black transition hover:bg-[#4fe65a]"
            >
              Save changes
            </button>
          </div>
        </div>

        <div
          class="grid gap-4 rounded-2xl border border-white/10 bg-zinc-950/40 p-4 sm:p-5"
        >
          <label class="grid gap-2 text-sm text-zinc-200">
            <span class="font-medium">Task title</span>
            <input
              type="text"
              name="title"
              placeholder="Enter task title"
              class="title w-full rounded-2xl border border-zinc-700 bg-zinc-950/80 px-4 py-3 text-white outline-none transition focus:border-purple-400 focus:ring-2 focus:ring-purple-500/20"
            />
          </label>

          <label class="grid gap-2 text-sm text-zinc-200">
            <span class="font-medium">Description</span>
            <textarea
              name="description"
              rows="5"
              placeholder="Add task details"
              class="min-h-32 w-full resize-none rounded-2xl border border-zinc-700 bg-zinc-950/80 px-4 py-3 text-white outline-none transition focus:border-purple-400 focus:ring-2 focus:ring-purple-500/20"
            ></textarea>
          </label>

          <div class="grid gap-4 sm:grid-cols-2">
            <div class="grid">
              <span class="font-medium text-zinc-200 text-sm leading-[normal]">Priority</span>

              <div class="prio-picker relative rounded-2xl border border-zinc-700 bg-zinc-950/80 px-4 py-3 text-white outline-none transition max-h-fit cursor-pointer">
                <button
                  type="button"
                  class="flex w-full items-center justify-between gap-3 text-left font-medium prio"
                  data-value=""
                >
                  <span>Priority</span>
                  <svg xmlns="http://www.w3.org/2000/svg" height="20px" viewBox="0 -960 960 960" width="20px" fill="#FFFFFF" class="transition-transform">
                    <path d="M480-344 240-584l56-56 184 184 184-184 56 56-240 240Z"/>
                  </svg>
                </button>
                <ul
                  class="priority hidden rounded-2xl border border-zinc-700 bg-zinc-950/80 text-white outline-none transition absolute top-[103%] left-0 right-0 z-20 overflow-hidden shadow-lg shadow-black/20"
                >
                  <li class="prio-option cursor-pointer px-3 py-[.72rem] transition hover:bg-zinc-400/40" data-value="low">Low</li>
                  <li class="prio-option cursor-pointer px-3 py-[.72rem] transition hover:bg-zinc-400/40" data-value="medium">Medium</li>
                  <li class="prio-option cursor-pointer px-3 py-[.72rem] transition hover:bg-zinc-400/40" data-value="high">High</li>
                </ul>
              </div>
            </div>

            <label class="grid gap-2 text-sm text-zinc-200">
              <span class="font-medium">Due date</span>
              <input
                type="date"
                name="dueDate"
                class="due-date rounded-2xl border border-zinc-700 bg-zinc-950/80 px-4 py-3 text-white outline-none transition focus:border-purple-400 focus:ring-2 focus:ring-purple-500/20"
              />
            </label>
          </div>

          <label class="grid gap-2 text-sm text-zinc-200">
            <span class="font-medium">Tags</span>
            <div class="rounded-2xl border border-zinc-700 bg-zinc-950/80 p-3">
              <div id="tag-chip-list" class="mb-2 flex min-h-8 flex-wrap gap-2"></div>
              <div class="flex flex-wrap items-center gap-2">
                <input
                  id="tag-input"
                  type="text"
                  placeholder="Add a tag"
                  class="tags min-w-0 flex-1 rounded-xl border border-zinc-700 bg-zinc-900/80 px-3 py-2 text-sm text-white outline-none transition focus:border-purple-400 focus:ring-2 focus:ring-purple-500/20"
                />
                <button
                  id="add-tag-btn"
                  type="button"
                  class="rounded-xl bg-purple-600 px-3 py-2 text-sm font-semibold text-white transition hover:bg-purple-500"
                >
                  Add
                </button>
              </div>
              <p class="mt-2 text-xs text-zinc-400">Press Enter or click Add to create a tag.</p>
            </div>
          </label>

          <p id="node-form-error" class="min-h-5 text-sm text-rose-300"></p>
        </div>
      </form>
    </dialog>
    <script
      src="js/Trello/script.js"
      type="module"
    ></script>
    <script
      src="js/Trello/drag-drop.js"
      type="module"
    ></script>
  </body>
</html>
